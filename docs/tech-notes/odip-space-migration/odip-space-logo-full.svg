<svg width="100%" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="bg" cx="50%" cy="45%" r="60%">
    <stop offset="0%" stop-color="#0f1f3d"/>
    <stop offset="100%" stop-color="#020814"/>
  </radialGradient>
  <radialGradient id="sg1" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#93c5fd"/>
  </radialGradient>
  <radialGradient id="sg2" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#6ee7b7"/>
  </radialGradient>
  <radialGradient id="sg3" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#ffffff"/>
    <stop offset="100%" stop-color="#c4b5fd"/>
  </radialGradient>
  <radialGradient id="nebula1" cx="30%" cy="40%" r="50%">
    <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#020814" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="nebula2" cx="70%" cy="60%" r="50%">
    <stop offset="0%" stop-color="#164e63" stop-opacity="0.2"/>
    <stop offset="100%" stop-color="#020814" stop-opacity="0"/>
  </radialGradient>
  <filter id="glow">
    <feGaussianBlur stdDeviation="3" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softglow">
    <feGaussianBlur stdDeviation="1.5" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

