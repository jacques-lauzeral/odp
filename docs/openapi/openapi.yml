openapi: 3.0.3
info:
  title: ODP REST API
  description: Operational Deployment Plan Management API
  version: 1.0.0
  contact:
    name: ODP Development Team

servers:
  - url: http://localhost
    description: Development server

security:
  - UserContext: []

# Import schemas and components from base file
components:
  $ref: 'openapi-base.yml#/components'

# Combine all paths from separate files
paths:
  # Setup entity endpoints
  /stakeholder-categories:
    $ref: 'openapi-setup.yml#/paths/~1stakeholder-categories'
  /stakeholder-categories/{id}:
    $ref: 'openapi-setup.yml#/paths/~1stakeholder-categories~1{id}'

  /domains:
    $ref: 'openapi-setup.yml#/paths/~1domains'
  /domains/{id}:
    $ref: 'openapi-setup.yml#/paths/~1domains~1{id}'

  /reference-documents:
    $ref: 'openapi-setup.yml#/paths/~1reference-documents'
  /reference-documents/{id}:
    $ref: 'openapi-setup.yml#/paths/~1reference-documents~1{id}'

  /bandwidths:
    $ref: 'openapi-setup.yml#/paths/~1bandwidths'
  /bandwidths/{id}:
    $ref: 'openapi-setup.yml#/paths/~1bandwidths~1{id}'

  /waves:
    $ref: 'openapi-setup.yml#/paths/~1waves'
  /waves/{id}:
    $ref: 'openapi-setup.yml#/paths/~1waves~1{id}'

  # Import endpoints
  /import/extract/word:
    $ref: 'openapi-import.yml#/paths/~1import~1extract~1word'
  /import/extract/word-hierarchy:
    $ref: 'openapi-import.yml#/paths/~1import~1extract~1word-hierarchy'
  /import/extract/excel:
    $ref: 'openapi-import.yml#/paths/~1import~1extract~1excel'
  /import/map/{drg}:
    $ref: 'openapi-import.yml#/paths/~1import~1map~1{drg}'
  /import/structured:
    $ref: 'openapi-import.yml#/paths/~1import~1structured'

  # Operational entity endpoints
  /operational-requirements:
    $ref: 'openapi-operational.yml#/paths/~1operational-requirements'
  /operational-requirements/{id}:
    $ref: 'openapi-operational.yml#/paths/~1operational-requirements~1{id}'
  /operational-requirements/{id}/versions:
    $ref: 'openapi-operational.yml#/paths/~1operational-requirements~1{id}~1versions'
  /operational-requirements/{id}/versions/{versionNumber}:
    $ref: 'openapi-operational.yml#/paths/~1operational-requirements~1{id}~1versions~1{versionNumber}'

  /operational-changes:
    $ref: 'openapi-operational.yml#/paths/~1operational-changes'
  /operational-changes/{id}:
    $ref: 'openapi-operational.yml#/paths/~1operational-changes~1{id}'
  /operational-changes/{id}/versions:
    $ref: 'openapi-operational.yml#/paths/~1operational-changes~1{id}~1versions'
  /operational-changes/{id}/versions/{versionNumber}:
    $ref: 'openapi-operational.yml#/paths/~1operational-changes~1{id}~1versions~1{versionNumber}'

  # Milestone endpoints
  /operational-changes/{id}/milestones:
    $ref: 'openapi-operational-milestones.yml#/paths/~1operational-changes~1{id}~1milestones'
  /operational-changes/{id}/milestones/{milestoneKey}:
    $ref: 'openapi-operational-milestones.yml#/paths/~1operational-changes~1{id}~1milestones~1{milestoneKey}'

  # Baseline management endpoints
  /baselines:
    $ref: 'openapi-baseline.yml#/paths/~1baselines'
  /baselines/{id}:
    $ref: 'openapi-baseline.yml#/paths/~1baselines~1{id}'

  # ODIP Edition endpoints
  /odp-editions:
    $ref: 'openapi-odp.yml#/paths/~1odp-editions'
  /odp-editions/{id}:
    $ref: 'openapi-odp.yml#/paths/~1odp-editions~1{id}'
  /odp-editions/{id}/export:
    $ref: 'openapi-odp.yml#/paths/~1odp-editions~1{id}~1export'
  /odp-editions/export:
    $ref: 'openapi-odp.yml#/paths/~1odp-editions~1export'


tags:
  - name: Stakeholder Categories
    description: Stakeholder category management
  - name: Domains
    description: Business domain management
  - name: Reference Documents
    description: Strategic reference document management
  - name: Bandwidths
    description: Per-domain yearly effort management
  - name: Waves
    description: Wave management for deployment timelines
  - name: Import
    description: Bulk import operations for setup and operational data
  - name: Operational Requirements
    description: Operational requirement management with versioning
  - name: Operational Changes
    description: Operational change management with versioning
  - name: Milestones
    description: Milestone management within operational changes
  - name: Baselines
    description: Baseline management for deployment planning
  - name: ODP
    description: ODP Edition management
  - name: Publications
    description: Edition publication operations for generating ODIP documents