openapi: 3.0.3

info:
  title: ODP REST API / Operational Requirement and Change Management
  description: Operational Requirement and Change Management API
  version: 1.0.0
  contact:
    name: ODP Development Team

paths:
  # Operational Requirement Endpoints
  /operational-requirements:
    get:
      summary: List all operational requirements (repository or edition context, content filtered)
      tags: [Operational Requirements]
      parameters:
        - name: edition
          in: query
          required: false
          schema:
            type: string
          description: "Optional edition ID. When provided, returns requirements in the edition context. Omit for repository (latest versions)."
          example: "42"
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [ON, OR]
          description: "Filter by requirement type. Omit for all types."
          example: "OR"
        - name: drg
          in: query
          required: false
          schema:
            type: string
            enum: [4DT, AIRPORT, ASM_ATFCM, CRISIS_FAAS, FLOW, IDL, NM_B2B, NMUI, PERF, RRT, TCF]
          description: "Filter by Drafting Group. Omit for all DRG values."
          example: "4DT"
        - name: title
          in: query
          required: false
          schema:
            type: string
          description: "Filter by title pattern matching"
          example: "authentication"
        - name: text
          in: query
          required: false
          schema:
            type: string
          description: "Full-text search across title, statement, rationale, flows, and nfrs"
          example: "security authentication"
        - name: stakeholderCategory
          in: query
          required: false
          schema:
            type: string
          description: "Filter by impacted stakeholder category ID. Single ID. OR type only."
          example: "123"
        - name: domain
          in: query
          required: false
          schema:
            type: string
          description: "Filter by domain ID. Single ID. For ONs: filters by assigned domain. For ORs: filters by impacted domains."
          example: "42"
        - name: strategicDocument
          in: query
          required: false
          schema:
            type: string
          description: "Filter by referenced strategic document ID. Single ID. ON type only."
          example: "13"

        # Relationship-based filtering parameters
        - name: refinesParent
          in: query
          required: false
          schema:
            type: string
          description: "Filter by parent Item ID: return requirements that refine the given parent (REFINES relationship). Single Item ID."
          example: "42"
        - name: dependency
          in: query
          required: false
          schema:
            type: string
          description: "Filter by dependency Item ID: return ORs that depend on the given OR (DEPENDS_ON relationship). Single Item ID."
          example: "42"
        - name: implementedON
          in: query
          required: false
          schema:
            type: string
          description: "Filter by ON Item ID: return ORs that implement the given ON (IMPLEMENTS relationship). Single Item ID."
          example: "42"
        - name: projection
          in: query
          required: false
          schema:
            type: string
            enum: [summary, standard]
            default: standard
          description: "Response projection. summary excludes rich-text fields. Default: standard."
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: 'openapi-base.yml#/components/schemas/OperationalRequirement'
        '400':
          description: Bad Request - Invalid edition ID or filter parameters
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

    post:
      summary: Create new operational requirement
      tags: [Operational Requirements]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'openapi-base.yml#/components/schemas/OperationalRequirementRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/OperationalRequirement'
        '400':
          description: Validation Error - Invalid DRG, maturity, implementedONs type mismatch, or missing required fields
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

  /operational-requirements/{id}:
    get:
      summary: Get operational requirement by ID (repository or edition context)
      tags: [Operational Requirements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "Operational Requirement Item ID"
        - name: edition
          in: query
          required: false
          schema:
            type: string
          description: "Optional edition ID. When provided, returns the requirement in the edition context. Omit for repository (latest version)."
        - name: projection
          in: query
          required: false
          schema:
            type: string
            enum: [standard, extended]
            default: standard
          description: "Response projection. extended adds reverse-traversal derived fields. Default: standard."
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/OperationalRequirement'
        '404':
          description: Not Found - Requirement not found or not included in specified edition
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '400':
          description: Bad Request - Invalid edition ID
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

    put:
      summary: Update operational requirement (creates new version with complete replacement)
      tags: [Operational Requirements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'openapi-base.yml#/components/schemas/OperationalRequirementUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/OperationalRequirement'
        '409':
          description: Version Conflict
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '400':
          description: Validation Error - Invalid DRG, maturity, or implementedONs type constraint violation
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

    patch:
      summary: Patch operational requirement (creates new version with partial updates)
      tags: [Operational Requirements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'openapi-base.yml#/components/schemas/OperationalRequirementPatchRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/OperationalRequirement'
        '409':
          description: Version Conflict
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '400':
          description: Validation Error - Invalid DRG, maturity, or implementedONs type constraint violation
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

    delete:
      summary: Delete operational requirement (all versions)
      tags: [Operational Requirements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content

  /operational-requirements/{id}/versions:
    get:
      summary: Get version history for operational requirement
      tags: [Operational Requirements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: 'openapi-base.yml#/components/schemas/VersionHistory'

  /operational-requirements/{id}/versions/{versionNumber}:
    get:
      summary: Get specific version of operational requirement
      tags: [Operational Requirements]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: versionNumber
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/OperationalRequirement'

  # Operational Change Endpoints
  /operational-changes:
    get:
      summary: List all operational changes (repository or edition context, content filtered)
      tags: [Operational Changes]
      parameters:
        - name: edition
          in: query
          required: false
          schema:
            type: string
          description: "Optional edition ID. When provided, returns changes in the edition context. Omit for repository (latest versions)."
          example: "42"
        - name: drg
          in: query
          required: false
          schema:
            type: string
            enum: [4DT, AIRPORT, ASM_ATFCM, CRISIS_FAAS, FLOW, IDL, NM_B2B, NMUI, PERF, RRT, TCF]
          description: "Filter by Drafting Group. Omit for all DRG values."
          example: "FLOW"
        - name: title
          in: query
          required: false
          schema:
            type: string
          description: "Filter by title pattern matching"
          example: "database migration"
        - name: text
          in: query
          required: false
          schema:
            type: string
          description: "Full-text search across title, purpose, initialState, finalState, and details"
          example: "performance optimization"
        - name: stakeholderCategory
          in: query
          required: false
          schema:
            type: string
          description: "Filter by stakeholder category ID(s) via implemented/decommissioned ORs. Comma-separated for OR logic."
          example: "123,456"
        - name: domain
          in: query
          required: false
          schema:
            type: string
          description: "Filter by domain ID(s) via implemented/decommissioned ORs. Comma-separated for OR logic."
          example: "789,101"

        # Relationship-based filtering parameters
        - name: implementsOR
          in: query
          required: false
          schema:
            type: string
          description: "Filter by OR Item ID: return OCs that implement the given OR (IMPLEMENTS relationship). Single Item ID."
          example: "42"
        - name: projection
          in: query
          required: false
          schema:
            type: string
            enum: [summary, standard]
            default: standard
          description: "Response projection. summary excludes rich-text fields. Default: standard."
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: 'openapi-base.yml#/components/schemas/OperationalChange'
        '400':
          description: Bad Request - Invalid edition ID or filter parameters
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

    post:
      summary: Create new operational change
      tags: [Operational Changes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'openapi-base.yml#/components/schemas/OperationalChangeRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/OperationalChange'
        '400':
          description: Validation Error - Invalid DRG, maturity, milestone eventTypes, or missing required fields
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

  /operational-changes/{id}:
    get:
      summary: Get operational change by ID (repository or edition context)
      tags: [Operational Changes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "Operational Change Item ID"
        - name: edition
          in: query
          required: false
          schema:
            type: string
          description: "Optional edition ID. When provided, returns the change in the edition context. Omit for repository (latest version)."
        - name: projection
          in: query
          required: false
          schema:
            type: string
            enum: [standard, extended]
            default: standard
          description: "Response projection. extended adds reverse-traversal derived fields. Default: standard."
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/OperationalChange'
        '404':
          description: Not Found - Change not found or not included in specified edition
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '400':
          description: Bad Request - Invalid edition ID
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

    put:
      summary: Update operational change (creates new version with complete replacement)
      tags: [Operational Changes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'openapi-base.yml#/components/schemas/OperationalChangeUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/OperationalChange'
        '409':
          description: Version Conflict
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '400':
          description: Validation Error - Invalid DRG, maturity, or missing required fields. Milestones are not accepted in this endpoint.
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

    patch:
      summary: Patch operational change (creates new version with partial updates)
      tags: [Operational Changes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'openapi-base.yml#/components/schemas/OperationalChangePatchRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/OperationalChange'
        '409':
          description: Version Conflict
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '400':
          description: Validation Error - Invalid DRG, maturity, or missing required fields. Milestones are not accepted in this endpoint.
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

    delete:
      summary: Delete operational change (all versions)
      tags: [Operational Changes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content

  /operational-changes/{id}/versions:
    get:
      summary: Get version history for operational change
      tags: [Operational Changes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: 'openapi-base.yml#/components/schemas/VersionHistory'

  /operational-changes/{id}/versions/{versionNumber}:
    get:
      summary: Get specific version of operational change
      tags: [Operational Changes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: versionNumber
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/OperationalChange'