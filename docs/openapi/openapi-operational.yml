          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [changeSetId]
              properties:
                changeSetId:
                  type: string
                note:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Soft-deleted
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/OperationalChange'
        '404':
          description: Not Found, or referenced change set not found (CHANGESET_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '409':
          description: |
            Lifecycle conflict — INVALID_LIFECYCLE_STATE (item is Released or not
            Active), LIFECYCLE_BLOCKED (blocking inbound references, list in body),
            or the referenced change set is closed (CHANGESET_CLOSED).
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/LifecycleConflictResponse'

  /operational-changes/{id}/restore:
    post:
      summary: Restore operational change (Deleted to Active)
      description: |
        Moves the item from the Deleted face back to Active. Refused if the item
        is not in the Deleted state (INVALID_LIFECYCLE_STATE). No reference check.
      tags: [Operational Changes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [changeSetId]
              properties:
                changeSetId:
                  type: string
                note:
                  type: string
                  nullable: true
      responses:
        '200':
          description: Restored
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/OperationalChange'
        '404':
          description: Not Found, or referenced change set not found (CHANGESET_NOT_FOUND)
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '409':
          description: |
            Lifecycle conflict — INVALID_LIFECYCLE_STATE (item is not Deleted), or
            the referenced change set is closed (CHANGESET_CLOSED).
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/LifecycleConflictResponse'

  /operational-changes/{id}/inbound-references:
    get:
      summary: Live O* items referencing this operational change (where-used)
      description: |
        Returns the flat list of live O* inbound references. Does not decide
        deletability — the client combines it with the item's lifecycleStatus.
      tags: [Operational Changes]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: 'openapi-base.yml#/components/schemas/OperationalEntityReference'