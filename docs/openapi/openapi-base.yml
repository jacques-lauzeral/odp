components:
  securitySchemes:
    UserContext:
      type: apiKey
      in: header
      name: X-User-ID

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    AnnotatedReference:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        note:
          type: string

    OperationalEntityReference:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [ON, OR, OC]

    # Setup Entity Schemas
    StakeholderCategory:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        parentId:
          type: string
          nullable: true

    StakeholderCategoryRequest:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string
        parentId:
          type: string
          nullable: true

    Domain:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        contact:
          type: string
          nullable: true
        parentId:
          type: string
          nullable: true

    DomainRequest:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string
        contact:
          type: string
          nullable: true
        parentId:
          type: string
          nullable: true

    Bandwidth:
      type: object
      properties:
        id:
          type: string
        year:
          type: integer
        waveId:
          type: string
          nullable: true
          description: "Optional wave reference — undefined means year-level scope"
        scope:
          type: string
          enum: [4DT, AIRPORT, ASM_ATFCM, CRISIS_FAAS, FLOW, IDL, NM_B2B, NMUI, PERF, RRT, TCF]
          nullable: true
          description: "Optional DrG scope — undefined means global scope"
        planned:
          type: integer
          nullable: true
          description: "Planned bandwidth in MW — optional"

    BandwidthRequest:
      type: object
      required: [year]
      properties:
        year:
          type: integer
        waveId:
          type: string
          nullable: true
          description: "Optional wave reference — undefined means year-level scope"
        scope:
          type: string
          enum: [4DT, AIRPORT, ASM_ATFCM, CRISIS_FAAS, FLOW, IDL, NM_B2B, NMUI, PERF, RRT, TCF]
          nullable: true
          description: "Optional DrG scope — undefined means global scope"
        planned:
          type: integer
          nullable: true
          description: "Planned bandwidth in MW — optional"

    ReferenceDocument:
      type: object
      properties:
        id:
          type: string
        parentId:
          type: string
          nullable: true
          description: "Parent ReferenceDocument ID — optional, max two levels"
        name:
          type: string
        description:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        url:
          type: string

    ReferenceDocumentRequest:
      type: object
      required: [name, url]
      properties:
        parentId:
          type: string
          nullable: true
          description: "Parent ReferenceDocument ID — optional, max two levels"
        name:
          type: string
        description:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        url:
          type: string

    Wave:
      type: object
      properties:
        id:
          type: string
        year:
          type: integer
        sequenceNumber:
          type: integer
          description: "Sequential number within the year"
        implementationDate:
          type: string
          format: date
          nullable: true

    WaveRequest:
      type: object
      required: [year, sequenceNumber]
      properties:
        year:
          type: integer
          minimum: 2024
          maximum: 2030
        sequenceNumber:
          type: integer
          minimum: 1
        implementationDate:
          type: string
          format: date
          nullable: true

    # Operational Entity Schemas
    TentativeRange:
      type: array
      description: "Year range for tentative implementation time as [start, end] where start <= end"
      items:
        type: integer
      minItems: 2
      maxItems: 2
      example: [2028, 2030]

    ORCost:
      type: object
      description: "Cost of an OR in the context of an OC"
      required: [orId, cost]
      properties:
        orId:
          type: string
          description: "OR item ID"
        cost:
          type: integer

    OperationalRequirement:
      type: object
      properties:
        itemId:
          type: string
        title:
          type: string
        versionId:
          type: string
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        code:
          type: string
          description: "System-generated unique code for this requirement"
        type:
          type: string
          enum: [ON, OR]
        statement:
          type: string
        rationale:
          type: string
        flows:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
          description: "Placeholder for attachments"
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
        path:
          type: array
          items:
            type: string
        drg:
          type: string
          enum: [4DT, AIRPORT, ASM_ATFCM, CRISIS_FAAS, FLOW, IDL, NM_B2B, NMUI, PERF, RRT, TCF]
        refinesParents:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
        # ON-only fields
        domain:
          $ref: '#/components/schemas/AnnotatedReference'
          description: "Domain reference — ON only"
        strategicDocuments:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          description: "Annotated references to ReferenceDocuments — ON only"
        tentative:
          $ref: '#/components/schemas/TentativeRange'
          description: "Tentative implementation time range — ON only"
        # OR-only fields
        implementedONs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ON-type requirements implemented by this OR — OR only"
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ORs that must be implemented before this OR — OR only"
        impactedStakeholders:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          description: "Impacted stakeholder categories — OR only"
        impactedDomains:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          description: "Impacted domains — OR only"
        nfrs:
          type: string
          nullable: true
          description: "Non-functional requirements — OR only"

    OperationalRequirementRequest:
      type: object
      required: [title, type, statement, rationale, maturity]
      properties:
        title:
          type: string
        type:
          type: string
          enum: [ON, OR]
        statement:
          type: string
        rationale:
          type: string
        flows:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
        path:
          type: array
          items:
            type: string
        drg:
          type: string
          enum: [4DT, AIRPORT, ASM_ATFCM, CRISIS_FAAS, FLOW, IDL, NM_B2B, NMUI, PERF, RRT, TCF]
        refinesParents:
          type: array
          items:
            type: string
          default: []
        # ON-only fields
        strategicDocuments:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          default: []
          description: "Annotated references to ReferenceDocument IDs — ON only"
        tentative:
          $ref: '#/components/schemas/TentativeRange'
          description: "Tentative implementation time range — ON only"
        # OR-only fields
        implementedONs:
          type: array
          items:
            type: string
          default: []
          description: "ON-type requirement item IDs — OR only"
        dependencies:
          type: array
          items:
            type: string
          default: []
          description: "OR item IDs that must be implemented before this OR — OR only"
        impactedStakeholders:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          default: []
          description: "Impacted stakeholder category IDs — OR only"
        impactedDomains:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          default: []
          description: "Impacted domain IDs — OR only"
        nfrs:
          type: string
          nullable: true
          description: "Non-functional requirements — OR only"

    OperationalRequirementUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/OperationalRequirementRequest'
        - type: object
          required: [expectedVersionId]
          properties:
            expectedVersionId:
              type: string

    OperationalRequirementPatchRequest:
      type: object
      required: [expectedVersionId]
      properties:
        expectedVersionId:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [ON, OR]
        statement:
          type: string
        rationale:
          type: string
        flows:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
        path:
          type: array
          items:
            type: string
        drg:
          type: string
          enum: [4DT, AIRPORT, ASM_ATFCM, CRISIS_FAAS, FLOW, IDL, NM_B2B, NMUI, PERF, RRT, TCF]
        refinesParents:
          type: array
          items:
            type: string
        strategicDocuments:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
        tentative:
          $ref: '#/components/schemas/TentativeRange'
        implementedONs:
          type: array
          items:
            type: string
        dependencies:
          type: array
          items:
            type: string
        impactedStakeholders:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
        impactedDomains:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
        nfrs:
          type: string
          nullable: true

    Milestone:
      type: object
      properties:
        milestoneKey:
          type: string
          description: "Stable UUID identifier preserved across versions"
        name:
          type: string
        description:
          type: string
        eventTypes:
          type: array
          items:
            type: string
            enum: [API_PUBLICATION, API_TEST_DEPLOYMENT, UI_TEST_DEPLOYMENT, OPS_DEPLOYMENT, API_DECOMMISSIONING]
        wave:
          $ref: '#/components/schemas/Wave'

    MilestoneRequest:
      type: object
      required: [name, eventTypes, waveId]
      properties:
        name:
          type: string
        description:
          type: string
        eventTypes:
          type: array
          items:
            type: string
            enum: [API_PUBLICATION, API_TEST_DEPLOYMENT, UI_TEST_DEPLOYMENT, OPS_DEPLOYMENT, API_DECOMMISSIONING]
        waveId:
          type: string

    MilestoneUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/MilestoneRequest'
        - type: object
          required: [expectedVersionId]
          properties:
            expectedVersionId:
              type: string
              description: "Version ID of the parent OperationalChange (for optimistic locking)"

    OperationalChangeVersionRef:
      type: object
      description: "Minimal OC version info returned after milestone mutations"
      properties:
        itemId:
          type: string
        versionId:
          type: string
        version:
          type: integer

    MilestoneCreateResponse:
      type: object
      properties:
        milestone:
          $ref: '#/components/schemas/Milestone'
        operationalChange:
          $ref: '#/components/schemas/OperationalChangeVersionRef'

    MilestoneUpdateResponse:
      type: object
      properties:
        milestone:
          $ref: '#/components/schemas/Milestone'
        operationalChange:
          $ref: '#/components/schemas/OperationalChangeVersionRef'

    MilestoneDeleteResponse:
      type: object
      properties:
        operationalChange:
          $ref: '#/components/schemas/OperationalChangeVersionRef'

    OperationalChange:
      type: object
      properties:
        itemId:
          type: string
        title:
          type: string
        versionId:
          type: string
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        code:
          type: string
          description: "System-generated unique code for this change"
        purpose:
          type: string
        initialState:
          type: string
        finalState:
          type: string
        details:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
          description: "Placeholder for attachments"
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
        cost:
          type: integer
          nullable: true
        orCosts:
          type: array
          items:
            $ref: '#/components/schemas/ORCost'
        path:
          type: array
          items:
            type: string
        drg:
          type: string
          enum: [4DT, AIRPORT, ASM_ATFCM, CRISIS_FAAS, FLOW, IDL, NM_B2B, NMUI, PERF, RRT, TCF]
        implementedORs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ORs implemented by this OC"
        decommissionedORs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ORs decommissioned by this OC"
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "OCs that must be deployed before this OC"
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Milestone'

    OperationalChangeBaseRequest:
      description: "Content fields for an OperationalChange. Does not include milestones — those are managed exclusively via the dedicated milestone endpoints."
      type: object
      required: [title, purpose, maturity]
      properties:
        title:
          type: string
        purpose:
          type: string
        initialState:
          type: string
        finalState:
          type: string
        details:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
        cost:
          type: integer
          nullable: true
        orCosts:
          type: array
          items:
            $ref: '#/components/schemas/ORCost'
          default: []
        path:
          type: array
          items:
            type: string
        drg:
          type: string
          enum: [4DT, AIRPORT, ASM_ATFCM, CRISIS_FAAS, FLOW, IDL, NM_B2B, NMUI, PERF, RRT, TCF]
        implementedORs:
          type: array
          items:
            type: string
          default: []
          description: "OR item IDs implemented by this OC"
        decommissionedORs:
          type: array
          items:
            type: string
          default: []
          description: "OR item IDs decommissioned by this OC"
        dependencies:
          type: array
          items:
            type: string
          default: []
          description: "OC item IDs that must be deployed before this OC"

    OperationalChangeRequest:
      description: "Create request for an OperationalChange. Milestones may be provided at creation time."
      allOf:
        - $ref: '#/components/schemas/OperationalChangeBaseRequest'
        - type: object
          properties:
            milestones:
              type: array
              items:
                $ref: '#/components/schemas/MilestoneRequest'
              default: []

    OperationalChangeUpdateRequest:
      description: "Full update request for an OperationalChange. Milestones are not accepted — use the dedicated milestone endpoints."
      allOf:
        - $ref: '#/components/schemas/OperationalChangeBaseRequest'
        - type: object
          required: [expectedVersionId]
          properties:
            expectedVersionId:
              type: string

    OperationalChangePatchRequest:
      description: "Partial update request for an OperationalChange. Milestones are not accepted — use the dedicated milestone endpoints."
      type: object
      required: [expectedVersionId]
      properties:
        expectedVersionId:
          type: string
        title:
          type: string
        purpose:
          type: string
        initialState:
          type: string
        finalState:
          type: string
        details:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
        cost:
          type: integer
          nullable: true
        orCosts:
          type: array
          items:
            $ref: '#/components/schemas/ORCost'
        path:
          type: array
          items:
            type: string
        drg:
          type: string
          enum: [4DT, AIRPORT, ASM_ATFCM, CRISIS_FAAS, FLOW, IDL, NM_B2B, NMUI, PERF, RRT, TCF]
        implementedORs:
          type: array
          items:
            type: string
        decommissionedORs:
          type: array
          items:
            type: string
        dependencies:
          type: array
          items:
            type: string

    VersionHistory:
      type: object
      properties:
        versionId:
          type: string
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string

    # Management Entity Schemas
    Baseline:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string

    BaselineRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string

    ODPEdition:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [ALPHA, BETA, RELEASE]
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        baseline:
          $ref: '#/components/schemas/AnnotatedReference'
        startsFromWave:
          $ref: '#/components/schemas/AnnotatedReference'

    ODPEditionRequest:
      type: object
      required: [title, type, baselineId, startsFromWaveId]
      properties:
        title:
          type: string
        type:
          type: string
          enum: [ALPHA, BETA, RELEASE]
        baselineId:
          type: string
        startsFromWaveId:
          type: string