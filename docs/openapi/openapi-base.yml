components:
  securitySchemes:
    UserContext:
      type: apiKey
      in: header
      name: X-User-ID

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    DraftingGroup:
      type: string
      description: "Deprecated for O* classification — retained exclusively for Bandwidth.scope. Use domain string keys from domains.json for O* domain assignment."
      enum: [4DT, AIRPORT, AIRSPACE, ASM_ATFCM, CRISIS, FAAS, FLOW, RRT, TCF, TRANSVERSAL]

    AnnotatedReference:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        note:
          type: string

    OperationalEntityReference:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [ON, OR, OC]

    # Setup Entity Schemas
    StakeholderCategory:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        parentId:
          type: string
          nullable: true

    StakeholderCategoryRequest:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string
        parentId:
          type: string
          nullable: true

    Bandwidth:
      type: object
      properties:
        id:
          type: string
        year:
          type: integer
        waveId:
          type: string
          nullable: true
          description: "Optional wave reference — undefined means year-level scope"
        scope:
          $ref: '#/components/schemas/DraftingGroup'
          nullable: true
          description: "Optional DrG scope — undefined means global scope"
        planned:
          type: integer
          nullable: true
          description: "Planned bandwidth in MW — optional"

    BandwidthRequest:
      type: object
      required: [year]
      properties:
        year:
          type: integer
        waveId:
          type: string
          nullable: true
          description: "Optional wave reference — undefined means year-level scope"
        scope:
          $ref: '#/components/schemas/DraftingGroup'
          nullable: true
          description: "Optional DrG scope — undefined means global scope"
        planned:
          type: integer
          nullable: true
          description: "Planned bandwidth in MW — optional"

    ReferenceDocument:
      type: object
      properties:
        id:
          type: string
        parentId:
          type: string
          nullable: true
          description: "Parent ReferenceDocument ID — optional, max two levels"
        name:
          type: string
        description:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        url:
          type: string

    ReferenceDocumentRequest:
      type: object
      required: [name, url]
      properties:
        parentId:
          type: string
          nullable: true
          description: "Parent ReferenceDocument ID — optional, max two levels"
        name:
          type: string
        description:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        url:
          type: string

    Wave:
      type: object
      properties:
        id:
          type: string
        year:
          type: integer
        sequenceNumber:
          type: integer
          description: "Sequential number within the year"
        implementationDate:
          type: string
          format: date
          nullable: true

    WaveRequest:
      type: object
      required: [year, sequenceNumber]
      properties:
        year:
          type: integer
          minimum: 2024
          maximum: 2030
        sequenceNumber:
          type: integer
          minimum: 1
        implementationDate:
          type: string
          format: date
          nullable: true

    # Operational Entity Schemas
    TentativeRange:
      type: array
      description: "Year range for tentative implementation time as [start, end] where start <= end"
      items:
        type: integer
      minItems: 2
      maxItems: 2
      example: [2028, 2030]

    ORCost:
      type: object
      description: "Cost of an OR in the context of an OC"
      required: [orId, cost]
      properties:
        orId:
          type: string
          description: "OR item ID"
        cost:
          type: integer

    OperationalRequirement:
      description: |
        Operational Requirement response. Fields present depend on the requested projection:
          summary  — identity + scalar + reference fields only
          standard — summary fields + rich-text fields (default)
          extended — standard fields + derived (reverse-traversal) fields
      type: object
      properties:
        # --- summary fields (all projections) ---
        itemId:
          type: string
        title:
          type: string
        versionId:
          type: string
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        code:
          type: string
          description: "System-generated unique code for this requirement"
        type:
          type: string
          enum: [ON, OR]
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
        domain:
          type: string
          description: "Domain key from domains.json"
        refinesParents:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
        # ON-only — summary
        strategicDocuments:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          description: "Annotated references to ReferenceDocuments — ON only"
        tentative:
          $ref: '#/components/schemas/TentativeRange'
          description: "Tentative implementation time range — ON only"
        # OR-only — summary
        implementedONs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ON-type requirements implemented by this OR — OR only"
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ORs that must be implemented before this OR — OR only"
        impactedStakeholders:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          description: "Impacted stakeholder categories — OR only"
        # --- rich-text fields (standard and extended projections only) ---
        statement:
          type: string
        rationale:
          type: string
        flows:
          type: string
        nfrs:
          type: string
          nullable: true
          description: "Non-functional requirements — OR only"
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
          description: "Placeholder for attachments"
        # --- derived fields (extended projection only — reverse-traversal) ---
        implementedByORs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ORs whose implementedONs references this ON — ON only. Extended projection only."
        implementedByOCs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "OCs whose implementedORs references this OR — OR only. Extended projection only."
        decommissionedByOCs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "OCs whose decommissionedORs references this OR — OR only. Extended projection only."
        refinedBy:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "Requirements whose refinesParents references this requirement. Extended projection only."
        requiredByORs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ORs whose dependencies references this OR — OR only. Extended projection only."

    OperationalRequirementRequest:
      type: object
      required: [title, type, statement, rationale, maturity]
      properties:
        title:
          type: string
        type:
          type: string
          enum: [ON, OR]
        statement:
          type: string
        rationale:
          type: string
        flows:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
        domain:
          type: string
          description: "Domain key from domains.json — mandatory"
        path:
          type: string
          description: "Topic locator for osHierarchy placement — create only, not stored"
        refinesParents:
          type: array
          items:
            type: string
          default: []
        # ON-only fields
        strategicDocuments:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          default: []
          description: "Annotated references to ReferenceDocument IDs — ON only"
        tentative:
          $ref: '#/components/schemas/TentativeRange'
          description: "Tentative implementation time range — ON only"
        # OR-only fields
        implementedONs:
          type: array
          items:
            type: string
          default: []
          description: "ON-type requirement item IDs — OR only"
        dependencies:
          type: array
          items:
            type: string
          default: []
          description: "OR item IDs that must be implemented before this OR — OR only"
        impactedStakeholders:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          default: []
          description: "Impacted stakeholder category IDs — OR only"
        nfrs:
          type: string
          nullable: true
          description: "Non-functional requirements — OR only"

    OperationalRequirementUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/OperationalRequirementRequest'
        - type: object
          required: [expectedVersionId]
          properties:
            expectedVersionId:
              type: string

    OperationalRequirementPatchRequest:
      type: object
      required: [expectedVersionId]
      properties:
        expectedVersionId:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [ON, OR]
        statement:
          type: string
        rationale:
          type: string
        flows:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
        domain:
          type: string
          description: "Domain key from domains.json"
        refinesParents:
          type: array
          items:
            type: string
        strategicDocuments:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
        tentative:
          $ref: '#/components/schemas/TentativeRange'
        implementedONs:
          type: array
          items:
            type: string
        dependencies:
          type: array
          items:
            type: string
        impactedStakeholders:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
        nfrs:
          type: string
          nullable: true

    Milestone:
      type: object
      properties:
        milestoneKey:
          type: string
          description: "Stable UUID identifier preserved across versions"
        name:
          type: string
        description:
          type: string
        eventTypes:
          type: array
          items:
            type: string
            enum: [API_PUBLICATION, API_TEST_DEPLOYMENT, UI_TEST_DEPLOYMENT, OPS_DEPLOYMENT, API_DECOMMISSIONING]
        wave:
          $ref: '#/components/schemas/Wave'

    MilestoneRequest:
      type: object
      required: [name, eventTypes, waveId]
      properties:
        name:
          type: string
        description:
          type: string
        eventTypes:
          type: array
          items:
            type: string
            enum: [API_PUBLICATION, API_TEST_DEPLOYMENT, UI_TEST_DEPLOYMENT, OPS_DEPLOYMENT, API_DECOMMISSIONING]
        waveId:
          type: string

    MilestoneUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/MilestoneRequest'
        - type: object
          required: [expectedVersionId]
          properties:
            expectedVersionId:
              type: string
              description: "Version ID of the parent OperationalChange (for optimistic locking)"

    OperationalChangeVersionRef:
      type: object
      description: "Minimal OC version info returned after milestone mutations"
      properties:
        itemId:
          type: string
        versionId:
          type: string
        version:
          type: integer

    MilestoneCreateResponse:
      type: object
      properties:
        milestone:
          $ref: '#/components/schemas/Milestone'
        operationalChange:
          $ref: '#/components/schemas/OperationalChangeVersionRef'

    MilestoneUpdateResponse:
      type: object
      properties:
        milestone:
          $ref: '#/components/schemas/Milestone'
        operationalChange:
          $ref: '#/components/schemas/OperationalChangeVersionRef'

    MilestoneDeleteResponse:
      type: object
      properties:
        operationalChange:
          $ref: '#/components/schemas/OperationalChangeVersionRef'

    OperationalChange:
      description: |
        Operational Change response. Fields present depend on the requested projection:
          summary  — identity + scalar + reference fields only
          standard — summary fields + rich-text fields (default)
          extended — standard fields + derived (reverse-traversal) fields
      type: object
      properties:
        # --- summary fields (all projections) ---
        itemId:
          type: string
        title:
          type: string
        versionId:
          type: string
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        code:
          type: string
          description: "System-generated unique code for this change"
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
        domain:
          type: string
          description: "Domain key from domains.json"
        implementedORs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ORs implemented by this OC"
        decommissionedORs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ORs decommissioned by this OC"
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "OCs that must be deployed before this OC"
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Milestone'
        cost:
          type: integer
          nullable: true
        orCosts:
          type: array
          items:
            $ref: '#/components/schemas/ORCost'
        # --- rich-text fields (standard and extended projections only) ---
        purpose:
          type: string
        initialState:
          type: string
        finalState:
          type: string
        details:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
          description: "Placeholder for attachments"
        # --- derived fields (extended projection only — reverse-traversal) ---
        requiredByOCs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "OCs whose dependencies references this OC. Extended projection only."

    OperationalChangeBaseRequest:
      description: "Content fields for an OperationalChange. Does not include milestones — those are managed exclusively via the dedicated milestone endpoints."
      type: object
      required: [title, purpose, maturity]
      properties:
        title:
          type: string
        purpose:
          type: string
        initialState:
          type: string
        finalState:
          type: string
        details:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
        cost:
          type: integer
          nullable: true
        orCosts:
          type: array
          items:
            $ref: '#/components/schemas/ORCost'
          default: []
        domain:
          type: string
          description: "Domain key from domains.json — mandatory"
        path:
          type: string
          description: "Topic locator for osHierarchy placement — create only, not stored"
        implementedORs:
          type: array
          items:
            type: string
          default: []
          description: "OR item IDs implemented by this OC"
        decommissionedORs:
          type: array
          items:
            type: string
          default: []
          description: "OR item IDs decommissioned by this OC"
        dependencies:
          type: array
          items:
            type: string
          default: []
          description: "OC item IDs that must be deployed before this OC"

    OperationalChangeRequest:
      description: "Create request for an OperationalChange. Milestones may be provided at creation time."
      allOf:
        - $ref: '#/components/schemas/OperationalChangeBaseRequest'
        - type: object
          properties:
            milestones:
              type: array
              items:
                $ref: '#/components/schemas/MilestoneRequest'
              default: []

    OperationalChangeUpdateRequest:
      description: "Full update request for an OperationalChange. Milestones are not accepted — use the dedicated milestone endpoints."
      allOf:
        - $ref: '#/components/schemas/OperationalChangeBaseRequest'
        - type: object
          required: [expectedVersionId]
          properties:
            expectedVersionId:
              type: string

    OperationalChangePatchRequest:
      description: "Partial update request for an OperationalChange. Milestones are not accepted — use the dedicated milestone endpoints."
      type: object
      required: [expectedVersionId]
      properties:
        expectedVersionId:
          type: string
        title:
          type: string
        purpose:
          type: string
        initialState:
          type: string
        finalState:
          type: string
        details:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
        cost:
          type: integer
          nullable: true
        orCosts:
          type: array
          items:
            $ref: '#/components/schemas/ORCost'
        domain:
          type: string
          description: "Domain key from domains.json"
        implementedORs:
          type: array
          items:
            type: string
        decommissionedORs:
          type: array
          items:
            type: string
        dependencies:
          type: array
          items:
            type: string

    # Chapter Entity Schemas
    OsHierarchyTopic:
      type: object
      required: [topic, ons, ors, ocs]
      properties:
        topic:
          type: string
          description: "Topic label"
        ons:
          type: array
          items:
            type: integer
          description: "ON item IDs in this topic"
        ors:
          type: array
          items:
            type: integer
          description: "OR item IDs in this topic"
        ocs:
          type: array
          items:
            type: integer
          description: "OC item IDs in this topic"
        subtopics:
          type: array
          items:
            $ref: '#/components/schemas/OsHierarchyTopic'
          description: "Nested sub-topics (recursive)"

    OsHierarchy:
      type: object
      required: [topics]
      properties:
        topics:
          type: array
          items:
            $ref: '#/components/schemas/OsHierarchyTopic'

    Chapter:
      description: |
        Chapter response. title is stored on the item node (set at bootstrap).
        domain, position, and parentKey are config-owned fields merged from edition.json
        at read time by the service layer and are not user-editable.
      type: object
      properties:
        itemId:
          type: string
        code:
          type: string
          description: "Stable chapter identifier (= chapter key from edition.json) — set at bootstrap"
        versionId:
          type: string
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        # item node field — set at bootstrap, not user-editable
        title:
          type: string
          description: "Display title — stored on item node at bootstrap"
        # config-owned fields — not stored, merged at read time
        domain:
          type: string
          nullable: true
          description: "Domain key from domains.json — null on pure narrative chapters"
        position:
          type: integer
          description: "Ordering within parent from edition.json"
        parentKey:
          type: string
          nullable: true
          description: "Parent chapter code — null for top-level chapters"
        # user-maintained fields
        narrative:
          type: string
          nullable: true
          description: "Chapter narrative content (Quill Delta JSON)"
        osHierarchy:
          $ref: '#/components/schemas/OsHierarchy'
          nullable: true
          description: "O* presentation order for this chapter"

    ChapterUpdateRequest:
      type: object
      required: [expectedVersionId]
      properties:
        expectedVersionId:
          type: string
        narrative:
          type: string
          nullable: true
        osHierarchy:
          $ref: '#/components/schemas/OsHierarchy'
          nullable: true

    ChapterPatchRequest:
      type: object
      required: [expectedVersionId]
      properties:
        expectedVersionId:
          type: string
        narrative:
          type: string
          nullable: true
        osHierarchy:
          $ref: '#/components/schemas/OsHierarchy'
          nullable: true

    VersionHistory:
      type: object
      properties:
        versionId:
          type: string
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string

    # Management Entity Schemas
    Baseline:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string

    BaselineRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string

    Edition:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [DRAFT, OFFICIAL]
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        baseline:
          $ref: '#/components/schemas/AnnotatedReference'
        startDate:
          type: string
          nullable: true
          description: "Optional lower bound date (yyyy-mm-dd) for OC milestone filtering and ON tentative period filtering"
        minONMaturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
          nullable: true
          description: "Optional minimum ON maturity gate for edition content selection"

    EditionRequest:
      type: object
      required: [title, type, baselineId]
      properties:
        title:
          type: string
        type:
          type: string
          enum: [DRAFT, OFFICIAL]
        baselineId:
          type: string
        startDate:
          type: string
          nullable: true
          description: "Optional lower bound date (yyyy-mm-dd) for OC milestone filtering and ON tentative period filtering"
        minONMaturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
          nullable: true
          description: "Optional minimum ON maturity gate for edition content selection"