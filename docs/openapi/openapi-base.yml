components:
  securitySchemes:
    UserContext:
      type: apiKey
      in: header
      name: X-User-ID
      description: "The user's email address. Validated against users.yaml by the server's resolveUser() middleware on every request; the role is server-derived (never client-declared). An unrecognised email is rejected with 401 UNKNOWN_USER."

  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string

    DraftingGroup:
      type: string
      description: "Deprecated for O* classification — retained exclusively for Bandwidth.scope. Use domain string keys from domains.json for O* domain assignment."
      enum: [4DT, AIRPORT, AIRSPACE, ASM_ATFCM, CRISIS, FAAS, FLOW, RRT, TCF, TRANSVERSAL]

    AnnotatedReference:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        note:
          type: string

    OperationalEntityReference:
      type: object
      properties:
        id:
          type: string
        code:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [ON, OR, OC]

    LifecycleStatus:
      type: object
      description: |
        Derived lifecycle flags computed from the presence of lifecycle edges
        on the item's version node (LATEST_VERSION / RELEASED_VERSION /
        DECOMMISSIONED_VERSION / DELETED_VERSION). At most two co-occur (e.g.
        an item may be both active and released). Read-only — never sent on a
        request payload (FORBIDDEN in the request models).
      properties:
        active:
          type: boolean
          description: "LATEST_VERSION present — the live, editable current version"
        released:
          type: boolean
          description: "RELEASED_VERSION present — in production (DEL-06)"
        decommissioned:
          type: boolean
          description: "DECOMMISSIONED_VERSION present — operationally retired (DEL-06)"
        deleted:
          type: boolean
          description: "DELETED_VERSION present — soft-deleted, in the recycle bin"

    LifecycleConflictResponse:
      type: object
      description: |
        409 body for a refused soft delete. Carries the standard error envelope
        plus a top-level references array (the blocking live O* inbound
        references) for the LIFECYCLE_BLOCKED case. references is absent for
        INVALID_LIFECYCLE_STATE.
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum: [LIFECYCLE_BLOCKED, INVALID_LIFECYCLE_STATE]
            message:
              type: string
        references:
          type: array
          description: "Blocking live O* inbound references — present for LIFECYCLE_BLOCKED only"
          items:
            $ref: '#/components/schemas/OperationalEntityReference'

    # Setup Entity Schemas
    StakeholderCategory:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        parentId:
          type: string
          nullable: true

    StakeholderCategoryRequest:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string
        parentId:
          type: string
          nullable: true

    Bandwidth:
      type: object
      properties:
        id:
          type: string
        year:
          type: integer
        waveId:
          type: string
          nullable: true
          description: "Optional wave reference — undefined means year-level scope"
        scope:
          $ref: '#/components/schemas/DraftingGroup'
          nullable: true
          description: "Optional DrG scope — undefined means global scope"
        planned:
          type: integer
          nullable: true
          description: "Planned bandwidth in MW — optional"

    BandwidthRequest:
      type: object
      required: [year]
      properties:
        year:
          type: integer
        waveId:
          type: string
          nullable: true
          description: "Optional wave reference — undefined means year-level scope"
        scope:
          $ref: '#/components/schemas/DraftingGroup'
          nullable: true
          description: "Optional DrG scope — undefined means global scope"
        planned:
          type: integer
          nullable: true
          description: "Planned bandwidth in MW — optional"

    ReferenceDocument:
      type: object
      properties:
        id:
          type: string
        parentId:
          type: string
          nullable: true
          description: "Parent ReferenceDocument ID — optional, max two levels"
        name:
          type: string
        description:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        url:
          type: string

    ReferenceDocumentRequest:
      type: object
      required: [name, url]
      properties:
        parentId:
          type: string
          nullable: true
          description: "Parent ReferenceDocument ID — optional, max two levels"
        name:
          type: string
        description:
          type: string
          nullable: true
        version:
          type: string
          nullable: true
        url:
          type: string

    Wave:
      type: object
      properties:
        id:
          type: string
        year:
          type: integer
        sequenceNumber:
          type: integer
          description: "Sequential number within the year"
        implementationDate:
          type: string
          format: date
          nullable: true

    WaveRequest:
      type: object
      required: [year, sequenceNumber]
      properties:
        year:
          type: integer
          minimum: 2024
          maximum: 2030
        sequenceNumber:
          type: integer
          minimum: 1
        implementationDate:
          type: string
          format: date
          nullable: true

    # Operational Entity Schemas
    TentativeRange:
      type: array
      description: "Year range for tentative implementation time as [start, end] where start <= end"
      items:
        type: integer
      minItems: 2
      maxItems: 2
      example: [2028, 2030]

    ORCost:
      type: object
      description: "Cost of an OR in the context of an OC"
      required: [orId, cost]
      properties:
        orId:
          type: string
          description: "OR item ID"
        cost:
          type: integer

    OperationalRequirement:
      description: |
        Operational Requirement response. Fields present depend on the requested projection:
          summary  — identity + scalar + reference fields only
          standard — summary fields + rich-text fields (default)
          extended — standard fields + derived (reverse-traversal) fields
      type: object
      properties:
        # --- summary fields (all projections) ---
        itemId:
          type: string
        lifecycleStatus:
          $ref: '#/components/schemas/LifecycleStatus'
          description: "Derived lifecycle flags (summary tier, all projections)"
        title:
          type: string
        versionId:
          type: string
        version:
          type: integer
        code:
          type: string
          description: "System-generated unique code for this requirement"
        type:
          type: string
          enum: [ON, OR]
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE, NO_SHOW]
        domain:
          type: string
          description: "Domain key from domains.json"
        refinesParents:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
        # ON-only — summary
        strategicDocuments:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          description: "Annotated references to ReferenceDocuments — ON only"
        tentative:
          $ref: '#/components/schemas/TentativeRange'
          description: "Tentative implementation time range — ON only"
        # OR-only — summary
        implementedONs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ON-type requirements implemented by this OR — OR only"
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ORs that must be implemented before this OR — OR only"
        impactedStakeholders:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          description: "Impacted stakeholder categories — OR only"
        actingStakeholders:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          description: "Acting stakeholder categories — those performing a role in the OR — OR only"
        # --- rich-text fields (standard and extended projections only) ---
        statement:
          type: string
        rationale:
          type: string
        flows:
          type: string
        nfrs:
          type: string
          nullable: true
          description: "Non-functional requirements — OR only"
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
          description: "Placeholder for attachments"
        # --- derived fields (extended projection only — reverse-traversal) ---
        implementedByORs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ORs whose implementedONs references this ON — ON only. Extended projection only."
        implementedByOCs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "OCs whose implementedORs references this OR — OR only. Extended projection only."
        decommissionedByOCs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "OCs whose decommissionedORs references this OR — OR only. Extended projection only."
        refinedBy:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "Requirements whose refinesParents references this requirement. Extended projection only."
        requiredByORs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ORs whose dependencies references this OR — OR only. Extended projection only."

    OperationalRequirementRequest:
      type: object
      required: [title, type, statement, rationale, maturity, changeSetId]
      properties:
        changeSetId:
          type: string
          description: "ID of the OPEN change set this write commits under (LCM)"
        note:
          type: string
          description: "Optional per-object annotation (recorded on the AuditEvent, LCM)"
        title:
          type: string
        type:
          type: string
          enum: [ON, OR]
        statement:
          type: string
        rationale:
          type: string
        flows:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE, NO_SHOW]
        domain:
          type: string
          description: "Domain key from domains.json — mandatory"
        path:
          type: string
          description: "Topic locator for osHierarchy placement — create only, not stored"
        refinesParents:
          type: array
          items:
            type: string
          default: []
        # ON-only fields
        strategicDocuments:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          default: []
          description: "Annotated references to ReferenceDocument IDs — ON only"
        tentative:
          $ref: '#/components/schemas/TentativeRange'
          description: "Tentative implementation time range — ON only"
        # OR-only fields
        implementedONs:
          type: array
          items:
            type: string
          default: []
          description: "ON-type requirement item IDs — OR only"
        dependencies:
          type: array
          items:
            type: string
          default: []
          description: "OR item IDs that must be implemented before this OR — OR only"
        impactedStakeholders:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          default: []
          description: "Impacted stakeholder category IDs — OR only"
        actingStakeholders:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
          default: []
          description: "Acting stakeholder category IDs — those performing a role in the OR — OR only"
        nfrs:
          type: string
          nullable: true
          description: "Non-functional requirements — OR only"

    OperationalRequirementUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/OperationalRequirementRequest'
        - type: object
          required: [expectedVersionId]
          properties:
            expectedVersionId:
              type: string

    OperationalRequirementPatchRequest:
      type: object
      required: [expectedVersionId, changeSetId]
      properties:
        expectedVersionId:
          type: string
        changeSetId:
          type: string
          description: "ID of the OPEN change set this write commits under (LCM)"
        note:
          type: string
          description: "Optional per-object annotation (LCM)"
        title:
          type: string
        type:
          type: string
          enum: [ON, OR]
        statement:
          type: string
        rationale:
          type: string
        flows:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE, NO_SHOW]
        domain:
          type: string
          description: "Domain key from domains.json"
        refinesParents:
          type: array
          items:
            type: string
        strategicDocuments:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
        tentative:
          $ref: '#/components/schemas/TentativeRange'
        implementedONs:
          type: array
          items:
            type: string
        dependencies:
          type: array
          items:
            type: string
        impactedStakeholders:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
        actingStakeholders:
          type: array
          items:
            $ref: '#/components/schemas/AnnotatedReference'
        nfrs:
          type: string
          nullable: true

    Milestone:
      type: object
      properties:
        milestoneKey:
          type: string
          description: "Stable UUID identifier preserved across versions"
        name:
          type: string
        description:
          type: string
        eventTypes:
          type: array
          items:
            type: string
            enum: [API_PUBLICATION, API_TEST_DEPLOYMENT, UI_TEST_DEPLOYMENT, OPS_DEPLOYMENT, API_DECOMMISSIONING]
        wave:
          $ref: '#/components/schemas/Wave'

    MilestoneRequest:
      type: object
      required: [name, eventTypes, waveId]
      properties:
        name:
          type: string
        description:
          type: string
        eventTypes:
          type: array
          items:
            type: string
            enum: [API_PUBLICATION, API_TEST_DEPLOYMENT, UI_TEST_DEPLOYMENT, OPS_DEPLOYMENT, API_DECOMMISSIONING]
        waveId:
          type: string

    MilestoneUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/MilestoneRequest'
        - type: object
          required: [expectedVersionId, changeSetId]
          properties:
            expectedVersionId:
              type: string
              description: "Version ID of the parent OperationalChange (for optimistic locking)"
            changeSetId:
              type: string
              description: "ID of the OPEN change set this write commits under (LCM)"
            note:
              type: string
              description: "Optional per-object annotation (LCM)"

    OperationalChangeVersionRef:
      type: object
      description: "Minimal OC version info returned after milestone mutations"
      properties:
        itemId:
          type: string
        versionId:
          type: string
        version:
          type: integer

    MilestoneCreateResponse:
      type: object
      properties:
        milestone:
          $ref: '#/components/schemas/Milestone'
        operationalChange:
          $ref: '#/components/schemas/OperationalChangeVersionRef'

    MilestoneUpdateResponse:
      type: object
      properties:
        milestone:
          $ref: '#/components/schemas/Milestone'
        operationalChange:
          $ref: '#/components/schemas/OperationalChangeVersionRef'

    MilestoneDeleteResponse:
      type: object
      properties:
        operationalChange:
          $ref: '#/components/schemas/OperationalChangeVersionRef'

    OperationalChange:
      description: |
        Operational Change response. Fields present depend on the requested projection:
          summary  — identity + scalar + reference fields only
          standard — summary fields + rich-text fields (default)
          extended — standard fields + derived (reverse-traversal) fields
      type: object
      properties:
        # --- summary fields (all projections) ---
        itemId:
          type: string
        lifecycleStatus:
          $ref: '#/components/schemas/LifecycleStatus'
          description: "Derived lifecycle flags (summary tier, all projections)"
        title:
          type: string
        versionId:
          type: string
        version:
          type: integer
        code:
          type: string
          description: "System-generated unique code for this change"
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
        domain:
          type: string
          description: "Domain key from domains.json"
        implementedORs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ORs implemented by this OC"
        decommissionedORs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "ORs decommissioned by this OC"
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "OCs that must be deployed before this OC"
        milestones:
          type: array
          items:
            $ref: '#/components/schemas/Milestone'
        cost:
          type: integer
          nullable: true
        orCosts:
          type: array
          items:
            $ref: '#/components/schemas/ORCost'
        # --- rich-text fields (standard and extended projections only) ---
        purpose:
          type: string
        initialState:
          type: string
        finalState:
          type: string
        details:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
          description: "Placeholder for attachments"
        # --- derived fields (extended projection only — reverse-traversal) ---
        requiredByOCs:
          type: array
          items:
            $ref: '#/components/schemas/OperationalEntityReference'
          description: "OCs whose dependencies references this OC. Extended projection only."

    OperationalChangeBaseRequest:
      description: "Content fields for an OperationalChange. Does not include milestones — those are managed exclusively via the dedicated milestone endpoints."
      type: object
      required: [title, purpose, maturity, changeSetId]
      properties:
        changeSetId:
          type: string
          description: "ID of the OPEN change set this write commits under (LCM)"
        note:
          type: string
          description: "Optional per-object annotation (recorded on the AuditEvent, LCM)"
        title:
          type: string
        purpose:
          type: string
        initialState:
          type: string
        finalState:
          type: string
        details:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
        cost:
          type: integer
          nullable: true
        orCosts:
          type: array
          items:
            $ref: '#/components/schemas/ORCost'
          default: []
        domain:
          type: string
          description: "Domain key from domains.json — mandatory"
        path:
          type: string
          description: "Topic locator for osHierarchy placement — create only, not stored"
        implementedORs:
          type: array
          items:
            type: string
          default: []
          description: "OR item IDs implemented by this OC"
        decommissionedORs:
          type: array
          items:
            type: string
          default: []
          description: "OR item IDs decommissioned by this OC"
        dependencies:
          type: array
          items:
            type: string
          default: []
          description: "OC item IDs that must be deployed before this OC"

    OperationalChangeRequest:
      description: "Create request for an OperationalChange. Milestones may be provided at creation time."
      allOf:
        - $ref: '#/components/schemas/OperationalChangeBaseRequest'
        - type: object
          properties:
            milestones:
              type: array
              items:
                $ref: '#/components/schemas/MilestoneRequest'
              default: []

    OperationalChangeUpdateRequest:
      description: "Full update request for an OperationalChange. Milestones are not accepted — use the dedicated milestone endpoints."
      allOf:
        - $ref: '#/components/schemas/OperationalChangeBaseRequest'
        - type: object
          required: [expectedVersionId]
          properties:
            expectedVersionId:
              type: string

    OperationalChangePatchRequest:
      description: "Partial update request for an OperationalChange. Milestones are not accepted — use the dedicated milestone endpoints."
      type: object
      required: [expectedVersionId, changeSetId]
      properties:
        expectedVersionId:
          type: string
        changeSetId:
          type: string
          description: "ID of the OPEN change set this write commits under (LCM)"
        note:
          type: string
          description: "Optional per-object annotation (LCM)"
        title:
          type: string
        purpose:
          type: string
        initialState:
          type: string
        finalState:
          type: string
        details:
          type: string
        privateNotes:
          type: string
        additionalDocumentation:
          type: string
          nullable: true
        maturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
        cost:
          type: integer
          nullable: true
        orCosts:
          type: array
          items:
            $ref: '#/components/schemas/ORCost'
        domain:
          type: string
          description: "Domain key from domains.json"
        implementedORs:
          type: array
          items:
            type: string
        decommissionedORs:
          type: array
          items:
            type: string
        dependencies:
          type: array
          items:
            type: string

    # Chapter Entity Schemas

    OsHierarchyItem:
      description: |
        Enriched O* reference in an osHierarchy topic — read path only.
        On write (update/patch), callers send bare integer ids; ChapterService
        enriches them to this shape on read.
      type: object
      properties:
        id:
          type: integer
          description: "O* item id"
        type:
          type: string
          enum: [ON, OR, OC]
          description: "O* entity type"
        code:
          type: string
          nullable: true
          description: "O* code — null if item no longer exists"
        title:
          type: string
          nullable: true
          description: "O* title — null if item no longer exists"

    OsHierarchyTopic:
      type: object
      required: [id, topic, ons, ors, ocs]
      properties:
        id:
          type: string
          description: >
            Unique identifier within the chapter osHierarchy scope.
            Assigned as the first free positive integer (as string) across the full hierarchy tree.
          example: "1"
        topic:
          type: string
          description: "Topic label"
        narrative:
          type: string
          nullable: true
          description: "Optional theme narrative (TipTap JSON string) — displayed above the O* list"
        ons:
          type: array
          items:
            $ref: '#/components/schemas/OsHierarchyItem'
          description: "ON items in this topic (enriched on read; integer ids on write)"
        ors:
          type: array
          items:
            $ref: '#/components/schemas/OsHierarchyItem'
          description: "OR items in this topic (enriched on read; integer ids on write)"
        ocs:
          type: array
          items:
            $ref: '#/components/schemas/OsHierarchyItem'
          description: "OC items in this topic (enriched on read; integer ids on write)"
        subtopics:
          type: array
          items:
            $ref: '#/components/schemas/OsHierarchyTopic'
          description: "Nested sub-topics (recursive)"

    OsHierarchy:
      type: object
      required: [topics]
      properties:
        topics:
          type: array
          items:
            $ref: '#/components/schemas/OsHierarchyTopic'

    Chapter:
      description: |
        Chapter response. title is stored on the item node (set at bootstrap).
        domain, position, and parentCode are config-owned fields merged from edition.json
        at read time by the service layer and are not user-editable.
      type: object
      properties:
        itemId:
          type: string
        code:
          type: string
          description: "Stable chapter identifier (= chapter key from edition.json) — set at bootstrap"
        versionId:
          type: string
        version:
          type: integer
        # item node field — set at bootstrap, not user-editable
        title:
          type: string
          description: "Display title — stored on item node at bootstrap"
        # config-owned fields — not stored, merged at read time
        domain:
          type: string
          nullable: true
          description: "Domain key from domains.json — null on pure narrative chapters"
        position:
          type: integer
          description: "Ordering within parent from edition.json"
        parentCode:
          type: string
          nullable: true
          description: "Parent chapter code — null for top-level chapters (formerly parentKey)"
        # user-maintained fields
        narrative:
          type: string
          nullable: true
          description: "Chapter narrative content (Quill Delta JSON)"
        osHierarchy:
          $ref: '#/components/schemas/OsHierarchy'
          nullable: true
          description: "O* presentation order for this chapter"

    OsHierarchyWriteTopic:
      description: |
        Write-path topic shape — ons/ors/ocs are integer arrays.
        Used in ChapterUpdateRequest and ChapterPatchRequest.
      type: object
      required: [id, topic, ons, ors, ocs]
      properties:
        id:
          type: string
          description: >
            Unique identifier within the chapter osHierarchy scope.
            Assigned as the first free positive integer (as string) across the full hierarchy tree.
          example: "1"
        topic:
          type: string
        narrative:
          type: string
          nullable: true
          description: "Optional theme narrative (TipTap JSON string)"
        ons:
          type: array
          items:
            type: integer
        ors:
          type: array
          items:
            type: integer
        ocs:
          type: array
          items:
            type: integer
        subtopics:
          type: array
          items:
            $ref: '#/components/schemas/OsHierarchyWriteTopic'

    OsHierarchyWrite:
      description: "Write-path OsHierarchy — topics contain integer id arrays."
      type: object
      required: [topics]
      properties:
        topics:
          type: array
          items:
            $ref: '#/components/schemas/OsHierarchyWriteTopic'

    ChapterUpdateRequest:
      type: object
      required: [expectedVersionId, changeSetId]
      properties:
        expectedVersionId:
          type: string
        changeSetId:
          type: string
          description: "ID of the OPEN change set this write commits under (LCM)"
        note:
          type: string
          description: "Optional per-object annotation (LCM)"
        narrative:
          type: string
          nullable: true
        osHierarchy:
          $ref: '#/components/schemas/OsHierarchyWrite'
          nullable: true

    ChapterPatchRequest:
      type: object
      required: [expectedVersionId, changeSetId]
      properties:
        expectedVersionId:
          type: string
        changeSetId:
          type: string
          description: "ID of the OPEN change set this write commits under (LCM)"
        note:
          type: string
          description: "Optional per-object annotation (LCM)"
        narrative:
          type: string
          nullable: true
        osHierarchy:
          $ref: '#/components/schemas/OsHierarchyWrite'
          nullable: true

    AuditEventRow:
      description: |
        A single entry in an item's audit timeline (Phase A — audit foundation).
        All fields frozen at write time; no join required on read.
        See openapi-audit-event.yml for the full schema definition.
      $ref: 'openapi-audit-event.yml#/components/schemas/AuditEventRow'

    # Management Entity Schemas
    Baseline:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string

    BaselineRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string

    Edition:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
          enum: [DRAFT, OFFICIAL]
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        baseline:
          $ref: '#/components/schemas/AnnotatedReference'
        startDate:
          type: string
          nullable: true
          description: "Optional lower bound date (yyyy-mm-dd) for OC milestone filtering and ON tentative period filtering"
        minONMaturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
          nullable: true
          description: "Optional minimum ON maturity gate for edition content selection"

    EditionRequest:
      type: object
      required: [title, type, baselineId]
      properties:
        title:
          type: string
        type:
          type: string
          enum: [DRAFT, OFFICIAL]
        baselineId:
          type: string
        startDate:
          type: string
          nullable: true
          description: "Optional lower bound date (yyyy-mm-dd) for OC milestone filtering and ON tentative period filtering"
        minONMaturity:
          type: string
          enum: [DRAFT, ADVANCED, MATURE]
          nullable: true
          description: "Optional minimum ON maturity gate for edition content selection"
    # ── Change-set (LCM) schemas ────────────────────────────────────────────
    ChangeSetClassifier:
      type: string
      description: "Nature of the change captured by a change set"
      enum: [NEW_CONTENT, IN_DEPTH_REWORK, CLARIFICATION, EDITORIAL]

    ChangeSetStatus:
      type: string
      enum: [OPEN, CLOSED]

    ChangeSetCommitFields:
      type: object
      description: "Commit metadata carried on every versioned write (LCM). The service splits these out of the request message into a changeSetCommit before calling the store."
      required: [changeSetId]
      properties:
        changeSetId:
          type: string
          description: "ID of the OPEN change set this write commits under"
        note:
          type: string
          description: "Optional per-object annotation (recorded on the AuditEvent)"

    ChangeSetCommit:
      type: object
      description: |
        Phase A (audit foundation): ChangeSetCommit is no longer returned on versioned-item
        responses. Who/when/why lives in the audit log, queried via GET /audit-events
        (the client builds an item's History by filtering on targetId). This schema is
        retained only as the write-path commit fragment embedded in request bodies
        (changeSetId + note).
      properties:
        changeSetId:
          type: string
          description: "ID of the OPEN change set this write commits under"
        note:
          type: string
          description: "Optional per-object annotation (recorded on the AuditEvent)"

    ChangeSet:
      type: object
      description: "Change set — the carrier of why content changed (LCM)"
      properties:
        id:
          type: string
        code:
          type: string
          description: "Stable human-readable handle, e.g. CS-00001; generated at creation; unique"
        title:
          type: string
        reasonText:
          type: string
        classifier:
          $ref: '#/components/schemas/ChangeSetClassifier'
        commentRefs:
          type: array
          items:
            type: string
          description: "Empty at P0"
        status:
          $ref: '#/components/schemas/ChangeSetStatus'
        createdAt:
          type: string
          format: date-time
        createdBy:
          type: string
        closedAt:
          type: string
          format: date-time
          nullable: true
        closedBy:
          type: string
          nullable: true

    ChangeSetCreateRequest:
      type: object
      required: [title, classifier]
      properties:
        title:
          type: string
        reasonText:
          type: string
        classifier:
          $ref: '#/components/schemas/ChangeSetClassifier'

    ChangeSetUpdateRequest:
      type: object
      description: "Edit title / reasonText — accepted only while the change set is OPEN"
      properties:
        title:
          type: string
        reasonText:
          type: string

    ChangeSetMember:
      type: object
      description: "A version committed under a change set (member-row projection)"
      properties:
        itemId:
          type: string
        itemType:
          type: string
          enum: [ON, OR, OC, CHAPTER]
        code:
          type: string
          nullable: true
        title:
          type: string
        versionId:
          type: string
        version:
          type: integer
        note:
          type: string