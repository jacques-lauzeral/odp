openapi: 3.0.3

info:
  title: ODP REST API / Edition Management
  description: ODIP Edition Management Operations
  version: 1.0.0
  contact:
    name: ODP Development Team

paths:
  # Edition CRUD Endpoints
  /odp-editions:
    get:
      summary: List all ODIP editions
      tags: [ODP]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: 'openapi-base.yml#/components/schemas/Edition'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

    post:
      summary: Create new ODIP Edition
      tags: [ODP]
      description: |
        Creates a new ODIP Edition referencing an existing baseline. The edition
        defines an optional wave lower bound and/or an optional minimum ON maturity
        gate, together driving the content selection algorithm when the edition is queried.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'openapi-base.yml#/components/schemas/EditionRequest'
      responses:
        '201':
          description: ODIP Edition created successfully
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Edition'
        '400':
          description: Bad Request - Invalid baseline or wave reference
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

  /odp-editions/{id}:
    get:
      summary: Get ODIP Edition by ID
      tags: [ODP]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Edition ID
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Edition'
        '404':
          description: Edition not found
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

  /odp-editions/{id}/publish:
    post:
      summary: Publish ODIP Edition as Antora website
      tags: [ODP]
      description: |
        Builds the Antora website for the specified edition and serves it at
        `/publication/site/`. Optionally also generates PDF (requires Ruby/Bundler +
        asciidoctor-pdf) and/or Word document (requires pandoc) from the same Antora
        source. Only one publication can run at a time — concurrent requests are
        rejected with 409. The build runs synchronously; logs are available in the
        server log stream. PDF and Word failures are non-fatal — the response returns
        null for the corresponding URL if the build failed.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Edition ID
        - name: pdf
          in: query
          required: false
          schema:
            type: boolean
          description: Also generate PDF document (requires Ruby/Bundler + asciidoctor-pdf)
        - name: word
          in: query
          required: false
          schema:
            type: boolean
          description: Also generate Word document (requires pandoc)
      responses:
        '200':
          description: Publication complete — URLs returned (null if format was not requested or failed)
          content:
            application/json:
              schema:
                type: object
                properties:
                  siteUrl:
                    type: string
                    example: /publication/site/
                  pdfUrl:
                    type: string
                    nullable: true
                    example: /publication/site/odip/_exports/index.pdf
                  wordUrl:
                    type: string
                    nullable: true
                    example: /publication/site/odip/_exports/index.docx
        '404':
          description: Edition not found
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '409':
          description: Publication already in progress
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

  /odp-editions/{id}/export:
    get:
      summary: Export ODIP Edition as AsciiDoc
      tags: [ODP]
      description: |
        Exports a specific ODIP Edition as an AsciiDoc document. The export includes
        all content selected by the edition's content selection algorithm (wave filter
        and/or ON maturity gate), formatted as a structured AsciiDoc document suitable
        for documentation generation.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Edition ID
      responses:
        '200':
          description: Success - AsciiDoc document
          content:
            text/plain:
              schema:
                type: string
                description: AsciiDoc formatted document
        '404':
          description: Edition not found
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

  /odp-editions/export:
    get:
      summary: Export entire repository as AsciiDoc
      tags: [ODP]
      description: |
        Exports the entire ODP repository as an AsciiDoc document. This includes
        all editions with their associated waves, milestones, and deliverables,
        organized in a comprehensive document structure.
      responses:
        '200':
          description: Success - AsciiDoc document
          content:
            text/plain:
              schema:
                type: string
                description: AsciiDoc formatted document containing all editions
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'