openapi: 3.0.3

info:
  title: ODP REST API / Edition Management
  description: ODIP Edition Management Operations
  version: 1.0.0
  contact:
    name: ODP Development Team

paths:
  # Edition CRUD Endpoints
  /odp-editions:
    get:
      summary: List all ODIP editions
      tags: [ODP]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: 'openapi-base.yml#/components/schemas/Edition'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

    post:
      summary: Create new ODIP Edition
      tags: [ODP]
      description: |
        Creates a new ODIP Edition referencing an existing baseline. The edition
        defines an optional wave lower bound and/or an optional minimum ON maturity
        gate, together driving the content selection algorithm when the edition is queried.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'openapi-base.yml#/components/schemas/EditionRequest'
      responses:
        '201':
          description: ODIP Edition created successfully
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Edition'
        '400':
          description: Bad Request - Invalid baseline or wave reference
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

  /odp-editions/{id}:
    get:
      summary: Get ODIP Edition by ID
      tags: [ODP]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Edition ID
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Edition'
        '404':
          description: Edition not found
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

  /odp-editions/{id}/publish:
    post:
      summary: Publish ODIP Edition as Antora website
      tags: [ODP]
      description: |
        Builds the Antora website for the specified edition and serves it at
        `/publication/site/`. Optionally also generates PDF (requires Ruby/Bundler +
        asciidoctor-pdf) and/or Word document (requires pandoc) from the same Antora
        source — either as a single flat file, a per-domain document set (ZIP), or both.

        Only one publication can run at a time — concurrent requests are rejected with 409.
        The build runs synchronously; logs are available in the server log stream.

        PDF and Word failures are non-fatal — the response returns null for the
        corresponding URL if the format was not requested or its build failed.

        **Default behaviour** (absent or empty request body): generates HTML site + flat PDF only,
        equivalent to `{ pdf: { flat: true } }`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Edition ID
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishOptions'
            examples:
              default:
                summary: Default — HTML + flat PDF only
                value: {}
              pdfAndWord:
                summary: Flat PDF + flat Word
                value:
                  pdf:
                    flat: true
                  word:
                    flat: true
              fullSet:
                summary: Flat + per-domain set for both formats
                value:
                  pdf:
                    flat: true
                    set:
                      intro: true
                      domains: [RRT, IDL, NM]
                  word:
                    flat: true
                    set:
                      intro: true
                      domains: [RRT, IDL, NM]
              setOnly:
                summary: Per-domain set only, no flat file
                value:
                  pdf:
                    set:
                      intro: true
                      domains: [RRT, IDL]
      responses:
        '200':
          description: |
            Publication complete. URLs are null if the format was not requested or its build failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishResult'
        '404':
          description: Edition not found
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '409':
          description: Publication already in progress
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

  /odp-editions/{id}/export:
    get:
      summary: Export ODIP Edition as AsciiDoc
      tags: [ODP]
      description: |
        Exports a specific ODIP Edition as an AsciiDoc document. The export includes
        all content selected by the edition's content selection algorithm (wave filter
        and/or ON maturity gate), formatted as a structured AsciiDoc document suitable
        for documentation generation.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Edition ID
      responses:
        '200':
          description: Success - AsciiDoc document
          content:
            text/plain:
              schema:
                type: string
                description: AsciiDoc formatted document
        '404':
          description: Edition not found
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

  /odp-editions/export:
    get:
      summary: Export entire repository as AsciiDoc
      tags: [ODP]
      description: |
        Exports the entire ODP repository as an AsciiDoc document. This includes
        all editions with their associated waves, milestones, and deliverables,
        organized in a comprehensive document structure.
      responses:
        '200':
          description: Success - AsciiDoc document
          content:
            text/plain:
              schema:
                type: string
                description: AsciiDoc formatted document containing all editions
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

components:
  schemas:

    PublishFormatOptions:
      type: object
      description: Publication options for a single output format (PDF or Word).
      properties:
        flat:
          type: boolean
          default: false
          description: Generate a single flat file covering all domains.
        set:
          type: object
          description: Generate a per-domain document set delivered as a ZIP archive.
          properties:
            intro:
              type: boolean
              default: false
              description: Include the introduction document in the set.
            domains:
              type: array
              description: DrG identifiers for which to generate a domain document. Empty array produces a ZIP with intro only (if requested).
              items:
                $ref: 'openapi-base.yml#/components/schemas/DraftingGroup'
              minItems: 0

    PublishOptions:
      type: object
      description: |
        Publication options. Absent or empty object defaults to `{ pdf: { flat: true } }`.
        At least one format option must resolve to a non-empty build set; otherwise the
        request is treated as default.
      properties:
        pdf:
          $ref: '#/components/schemas/PublishFormatOptions'
        word:
          $ref: '#/components/schemas/PublishFormatOptions'

    PublishFormatResult:
      type: object
      description: URLs produced for a single output format. Null fields indicate the output was not requested or its build failed.
      properties:
        flatUrl:
          type: string
          nullable: true
          description: URL of the flat file.
          example: /publication/site/odip/_exports/index.pdf
        setUrl:
          type: string
          nullable: true
          description: URL of the ZIP archive containing the per-domain document set.
          example: /publication/site/odip/_exports/set-pdf.zip

    PublishResult:
      type: object
      properties:
        siteUrl:
          type: string
          description: URL of the served HTML site (always present on success).
          example: /publication/site/
        pdf:
          $ref: '#/components/schemas/PublishFormatResult'
        word:
          $ref: '#/components/schemas/PublishFormatResult'