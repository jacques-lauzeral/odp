openapi: 3.0.3

info:
  title: ODP REST API / Edition Management
  description: ODIP Edition Management Operations
  version: 1.0.0
  contact:
    name: ODP Development Team

paths:
  # Edition CRUD Endpoints
  /odp-editions:
    get:
      summary: List all ODIP editions
      tags: [ODP]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: 'openapi-base.yml#/components/schemas/Edition'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

    post:
      summary: Create new ODIP Edition
      tags: [ODP]
      description: |
        Creates a new ODIP Edition referencing an existing baseline. The edition
        defines an optional wave lower bound and/or an optional minimum ON maturity
        gate, together driving the content selection algorithm when the edition is queried.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'openapi-base.yml#/components/schemas/EditionRequest'
      responses:
        '201':
          description: ODIP Edition created successfully
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Edition'
        '400':
          description: Bad Request - Invalid baseline or wave reference
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

  /odp-editions/{id}:
    get:
      summary: Get ODIP Edition by ID
      tags: [ODP]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Edition ID
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Edition'
        '404':
          description: Edition not found
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

  /odp-editions/{id}/publish:
    post:
      summary: Publish ODIP Edition
      tags: [ODP]
      description: |
        Builds one or more publication outputs for the specified edition.

        **Output formats:**
        - `wordFlat` — single Word document covering all selected content
        - `wordMultipart` — one Word document per domain + intro, delivered as a ZIP
        - `pdfFlat` — single PDF document covering all selected content
        - `website` — builds and serves the HTML site; copies any pre-generated
          Word/PDF artifacts into the site exports directory if available

        **Content selection** (`intro`, `domains`) applies to `wordFlat`, `wordMultipart`,
        and `pdfFlat`. Omitting both includes all content (intro + all domains).

        Only one publication can run at a time — concurrent requests are rejected with 409.
        The build runs synchronously; logs are available in the server log stream.
        Non-website format failures are non-fatal — the corresponding URL is null in the response.

        **Default behaviour** (absent or empty request body): `{ website: true }`.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Edition ID
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishOptions'
            examples:
              default:
                summary: Default — website only
                value: {}
              wordFlat:
                summary: Flat Word document, all content
                value:
                  wordFlat: {}
              wordFlatSelection:
                summary: Flat Word document, intro + selected domains
                value:
                  wordFlat:
                    intro: true
                    domains: [RRT, IDL, NM]
              wordMultipart:
                summary: Multipart Word ZIP, intro + selected domains
                value:
                  wordMultipart:
                    intro: true
                    domains: [RRT, IDL, NM]
              pdfFlat:
                summary: Flat PDF document, all content
                value:
                  pdfFlat: {}
              websiteOnly:
                summary: Website only (picks up pre-generated artifacts)
                value:
                  website: true
              all:
                summary: All formats + website
                value:
                  wordFlat:
                    intro: true
                    domains: [RRT, IDL, NM]
                  wordMultipart:
                    intro: true
                    domains: [RRT, IDL, NM]
                  pdfFlat:
                    intro: true
                    domains: [RRT, IDL, NM]
                  website: true
      responses:
        '200':
          description: |
            Publication complete. URLs are null if the format was not requested or its build failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishResult'
        '404':
          description: Edition not found
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '409':
          description: Publication already in progress
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

  /odp-editions/{id}/export:
    get:
      summary: Export ODIP Edition as AsciiDoc
      tags: [ODP]
      description: |
        Exports a specific ODIP Edition as an AsciiDoc document. The export includes
        all content selected by the edition's content selection algorithm (wave filter
        and/or ON maturity gate), formatted as a structured AsciiDoc document suitable
        for documentation generation.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Edition ID
      responses:
        '200':
          description: Success - AsciiDoc document
          content:
            text/plain:
              schema:
                type: string
                description: AsciiDoc formatted document
        '404':
          description: Edition not found
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

  /odp-editions/export:
    get:
      summary: Export entire repository as AsciiDoc
      tags: [ODP]
      description: |
        Exports the entire ODP repository as an AsciiDoc document. This includes
        all editions with their associated waves, milestones, and deliverables,
        organized in a comprehensive document structure.
      responses:
        '200':
          description: Success - AsciiDoc document
          content:
            text/plain:
              schema:
                type: string
                description: AsciiDoc formatted document containing all editions
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

components:
  schemas:

    ContentSelection:
      type: object
      description: |
        Content selection for a document build. Omitting both `intro` and `domains`
        includes all content (intro + all domains).
      properties:
        intro:
          type: boolean
          default: false
          description: Include the introduction section.
        domains:
          type: array
          description: |
            DrG identifiers to include. Omit or pass empty array to include all domains.
          items:
            $ref: 'openapi-base.yml#/components/schemas/DraftingGroup'
          minItems: 0

    PublishOptions:
      type: object
      description: |
        Publication options. Absent or empty object defaults to `{ website: true }`.
      properties:
        wordFlat:
          $ref: '#/components/schemas/ContentSelection'
          description: Generate a single flat Word document.
        wordMultipart:
          $ref: '#/components/schemas/ContentSelection'
          description: Generate a multipart Word ZIP (one .docx per domain + intro).
        pdfFlat:
          $ref: '#/components/schemas/ContentSelection'
          description: Generate a single flat PDF document.
        website:
          type: boolean
          default: false
          description: |
            Build and serve the HTML site. Copies any pre-generated Word/PDF artifacts
            into the site exports directory if available.

    PublishResult:
      type: object
      description: |
        Publication result. URLs are null if the format was not requested or its build failed.
      properties:
        siteUrl:
          type: string
          nullable: true
          description: URL of the served HTML site. Null if website was not requested.
          example: /publication/site/
        wordFlatUrl:
          type: string
          nullable: true
          description: URL of the flat Word document.
          example: /publication/exports/index.docx
        wordMultipartUrl:
          type: string
          nullable: true
          description: URL of the multipart Word ZIP.
          example: /publication/exports/word-multipart.zip
        pdfFlatUrl:
          type: string
          nullable: true
          description: URL of the flat PDF document.
          example: /publication/exports/index.pdf