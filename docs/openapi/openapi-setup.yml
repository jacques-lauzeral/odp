paths:
  # Stakeholder Category Endpoints
  /stakeholder-categories:
    get:
      summary: List all stakeholder categories
      tags: [Stakeholder Categories]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: 'openapi-base.yml#/components/schemas/StakeholderCategory'

    post:
      summary: Create new stakeholder category
      tags: [Stakeholder Categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'openapi-base.yml#/components/schemas/StakeholderCategoryRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/StakeholderCategory'

  /stakeholder-categories/{id}:
    get:
      summary: Get stakeholder category by ID
      tags: [Stakeholder Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/StakeholderCategory'

    put:
      summary: Update stakeholder category
      tags: [Stakeholder Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: 'openapi-base.yml#/components/schemas/StakeholderCategoryRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/StakeholderCategory'

    delete:
      summary: Delete stakeholder category
      tags: [Stakeholder Categories]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content

