# openapi-audit-event.yml
# Phase A — audit foundation
# AuditEvent schemas and the /audit-events query interface.
#
# AuditEvent is the sole authoritative audit record for every consequential write.
# All fields are frozen at write time — no join required on read.
#
# There is no item-scoped /history endpoint: History is a client concern. The
# client builds an item's timeline by querying GET /audit-events?targetId=<id>.
# The same interface backs the change-set members view (?changeSetId=) and
# actor-scoped queries (?userId=).

components:
  schemas:

    AuditAction:
      type: string
      description: "The type of action recorded by an AuditEvent."
      enum:
        - CREATE
        - UPDATE
        - DELETE
        - RESTORE
        - HARD_DELETE
        - CLOSE
        - REOPEN
        - PUBLISH
        - BASELINE
        - DECOMMISSION   # reserved — not yet in use (Phase B / DEL-06)

    AuditTargetType:
      type: string
      description: "The entity type targeted by an AuditEvent."
      enum:
        - ON
        - OR
        - OC
        - CHAPTER
        - CHANGESET
        - EDITION
        - BASELINE
        - WAVE

    AuditEventRow:
      type: object
      description: |
        A single audit-log entry. All fields are frozen at write time and never
        resolved on read — every consumer (the /audit-events interface, the
        client-built History timeline, the change-set members view) reads this
        one shape. A HARD_DELETE event outlives its target: the TARGETS
        relationship is removed with the item, but targetId/targetType/
        targetCode/targetTitle remain on the event as the only surviving trace.
      properties:
        id:
          type: string
          description: "AuditEvent node ID"
        action:
          $ref: '#/components/schemas/AuditAction'
        userId:
          type: string
          description: "Stable logical actor key — mirrors the transaction's userId"
          nullable: true
        userRole:
          type: string
          description: "UserRole key at action time, frozen (null until RBA populates the header)"
          nullable: true
        timestamp:
          type: string
          format: date-time
        targetId:
          type: string
          description: "Stable item identity; persisted as scalar so it survives hard delete"
        targetType:
          $ref: '#/components/schemas/AuditTargetType'
        targetCode:
          type: string
          nullable: true
          description: "Item code at action time; null for code-less chapters"
        targetTitle:
          type: string
          description: "Item title at action time, frozen"
        targetVersion:
          type: integer
          nullable: true
          description: "Version sequence number for version-producing actions; null otherwise"
        versionId:
          type: string
          nullable: true
          description: "ItemVersion node id, resolved from targetId + targetVersion in the same query; null for non-version-producing events or when the version no longer exists"
        changeSetCode:
          type: string
          nullable: true
          description: "CS-##### handle; null when not change-set-bound"
        changeSetTitle:
          type: string
          nullable: true
          description: "Change set title at commit time, frozen"
        classifier:
          type: string
          nullable: true
          description: "ChangeSetClassifier key at commit time, frozen"
          enum: [NEW_CONTENT, IN_DEPTH_REWORK, CLARIFICATION, EDITORIAL]
        note:
          type: string
          nullable: true
          description: "Per-object annotation (formerly on the HAS_REASON edge)"

paths:

  /audit-events:
    get:
      summary: Query the audit log
      description: |
        Returns AuditEvent rows matching the supplied filters, ordered by
        timestamp ascending. All query parameters are optional and AND-combined;
        with no filter the entire log is returned. Read-only — the append-only
        log is never mutated via REST.

        The client builds an item's History timeline by passing targetId. The
        change-set members view passes changeSetId. userId scopes to one actor.
      tags: [Audit Events]
      parameters:
        - name: changeSetId
          in: query
          required: false
          schema:
            type: string
          description: "Filter to events committed under this change set (UNDER_CHANGESET)"
        - name: targetId
          in: query
          required: false
          schema:
            type: string
          description: "Filter to events targeting this item (TARGETS) — the History timeline filter"
        - name: userId
          in: query
          required: false
          schema:
            type: string
          description: "Filter to events recorded for this actor"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: 'openapi-base.yml#/components/schemas/AuditEventRow'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: 'openapi-base.yml#/components/schemas/Error'

tags:
  - name: Audit Events
    description: Append-only audit log — the sole audit surface (Phase A)