apiVersion: v1
kind: Pod
metadata:
  name: odp-pod
spec:
  containers:

    # Neo4j Database
    - name: neo4j
      image: $ODIP_DOCKER_REGISTRY/neo4j:5.15
      ports:
        - containerPort: 7474
          hostPort: 7474
        - containerPort: 7687
          hostPort: 7687
      env:
        - name: NEO4J_AUTH
          value: "neo4j/password123"
        - name: NEO4J_PLUGINS
          value: '["apoc"]'
      volumeMounts:
        - name: neo4j-data
          mountPath: /data

    # ODP Server
    - name: odp-server
      image: $ODIP_DOCKER_REGISTRY/node:20
      workingDir: /app/workspace/server
      ports:
        - containerPort: 80
          hostPort: 8080
      command: ["sh", "-c", "npm run dev"]
      env:
        - name: NODE_ENV
          value: "development"
        - name: NEO4J_URI
          value: "bolt://localhost:7687"
        - name: NEO4J_USER
          value: "neo4j"
        - name: NEO4J_PASSWORD
          value: "password123"
        - name: STATIC_CONTENT_PATH
          value: "/app/publication/web-site/static"
        - name: LOG_PATH
          value: "/odip/logs"
      volumeMounts:
        - name: odp-code
          mountPath: /app
        - name: odip-runtime
          mountPath: /odip

    # Web Client
    - name: web-client
      image: localhost/odp-web-client:latest
      imagePullPolicy: Never
      ports:
        - containerPort: 3000
          hostPort: 3000
      env:
        - name: NODE_ENV
          value: "development"

  volumes:
    - name: neo4j-data
      hostPath:
        path: $ODIP_HOME/data
        type: Directory
    - name: odp-code
      hostPath:
        path: $ODIP_REPO
        type: Directory
    - name: odip-runtime
      hostPath:
        path: $ODIP_HOME
        type: Directory