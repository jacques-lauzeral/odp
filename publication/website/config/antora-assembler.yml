component_versions: '**'
assembly:
  section_merge_strategy: fuse
asciidoc:
  attributes:
    allow-uri-read: ''
    source-highlighter: rouge
    toc: ''
    toclevels: 3
    sectnums: ''
    sectnumlevels: 7
    version-label: 'Edition'            # ← Changes "Version" to "Edition"
    env-export: ''
pdf-theme: ./pdf-theme.yml
output:
  dir: ./build/exports
build:
  command: asciidoctor-pdf